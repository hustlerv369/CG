<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CG Dashboard — multi-agent orchestrator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/static/dashboard.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.10.0/build/styles/github-dark.min.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.10.0/build/highlight.min.js"></script>
</head>
<body>
  <header>
    <h1>CG <span class="dim">— multi-agent</span></h1>
    <div class="status" id="server-status">connecting…</div>
  </header>

  <main>
    <!-- LEFT: workflow designer -->
    <section class="designer">
      <h2>Workflow</h2>

      <div class="row">
        <label>Preset</label>
        <select id="preset-select">
          <option value="">— pick a preset —</option>
        </select>
      </div>

      <div class="row">
        <label>Saved workflows</label>
        <div class="workflows-row">
          <select id="workflow-select">
            <option value="">— load saved —</option>
          </select>
          <button class="ghost" id="save-workflow-btn" title="Save current workflow (Ctrl+S)">💾</button>
          <button class="ghost" id="save-disk-btn" title="Save to disk (D:\CG\workflows\)">📁</button>
          <button class="ghost" id="del-workflow-btn" title="Delete selected workflow">🗑</button>
        </div>
      </div>

      <div class="row">
        <label>Title</label>
        <input id="run-title" type="text" placeholder="What is this run for?" />
      </div>

      <div id="agent-rows"></div>

      <div class="agent-controls">
        <button class="ghost" id="add-agent">+ add agent</button>
      </div>

      <div class="actions">
        <button class="primary" id="run-btn">▶ Run</button>
        <button class="ghost" id="clear-btn">Clear</button>
      </div>

      <h2 class="section">History</h2>
      <ul id="history"></ul>
    </section>

    <!-- RIGHT: live monitor -->
    <section class="monitor">
      <div class="monitor-header">
        <h2 id="run-title-display">no run yet</h2>
        <div class="monitor-meta" id="run-meta"></div>
        <div class="view-toggle" id="view-toggle">
          <button class="seg active" data-view="raw" title="Raw plain-text output">raw</button>
          <button class="seg" data-view="md" title="Render Markdown + code highlighting">markdown</button>
          <button class="seg" data-view="diff" title="Side-by-side diff (best for compare preset)">diff</button>
        </div>
      </div>
      <div id="agent-grid" class="agent-grid">
        <div class="empty-state">
          ← define a workflow on the left, then hit Run.<br />
          Each agent's live stdout will appear here in its own panel.
        </div>
      </div>
    </section>
  </main>

  <script src="/static/dashboard.js"></script>
</body>
</html>
